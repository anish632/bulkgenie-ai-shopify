app = "bulkgenie"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[processes]
  web = "npm run start"
  worker = "npx tsx app/services/queue/worker.ts"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[[services]]
  internal_port = 3000
  protocol = "tcp"
  processes = ["web"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = 10000
    grace_period = "10s"
    method = "get"
    path = "/"
    protocol = "http"
    timeout = 2000
